<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>TV2026</title>
  <defs>
    <!-- Indigo app-tile gradient, matching the renderer accent palette. -->
    <linearGradient id="tile" x1="160" y1="120" x2="900" y2="940" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="0.55" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
    <!-- Soft top highlight for depth. -->
    <radialGradient id="glow" cx="0.32" cy="0.24" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded "squircle" tile. -->
  <rect x="64" y="64" width="896" height="896" rx="216" fill="url(#tile)"/>
  <rect x="64" y="64" width="896" height="896" rx="216" fill="url(#glow)"/>

  <!-- Broadcast / "live" arcs (top-right) — subtle streaming motif. -->
  <g stroke="#ffffff" stroke-linecap="round" fill="none" opacity="0.55">
    <path d="M 690 300 A 150 150 0 0 1 760 408" stroke-width="34"/>
    <path d="M 648 250 A 230 230 0 0 1 812 432" stroke-width="34" opacity="0.7"/>
  </g>

  <!-- Lens / screen disc behind the play glyph. -->
  <circle cx="500" cy="540" r="252" fill="#ffffff" opacity="0.12"/>

  <!-- Rounded play triangle. -->
  <path d="M 432 408 L 432 672 L 660 540 Z"
        fill="#ffffff" stroke="#ffffff" stroke-width="58" stroke-linejoin="round" stroke-linecap="round"/>
</svg>
