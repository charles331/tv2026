name: Release

# À chaque fusion sur `main`, semantic-release analyse les commits (Conventional
# Commits), calcule la prochaine version (semver), construit l'installeur Windows
# et publie une Release GitHub avec des notes générées automatiquement.
# Aucun bump manuel de version : c'est entièrement piloté par les messages de commit.
on:
  push:
    branches:
      - main
  workflow_dispatch:

# semantic-release a besoin d'écrire le tag/la release ; les autres permissions
# servent aux commentaires de PR/issues éventuels.
permissions:
  contents: write
  issues: write
  pull-requests: write

# Une seule release à la fois (évite deux runs concurrents sur main).
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # semantic-release a besoin de tout l'historique + des tags pour
          # déterminer la dernière version publiée.
          fetch-depth: 0
          persist-credentials: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        # Le postinstall recompile better-sqlite3 pour l'ABI Electron (nécessaire
        # au packaging Windows).
        run: pnpm install --frozen-lockfile

      - name: Bundle mpv (best-effort)
        # Récupère un build mpv Windows x64 dans resources/bin/win/ pour que la
        # lecture vidéo marche dans l'app publiée. Non bloquant.
        continue-on-error: true
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path resources/bin/win | Out-Null
          $headers = @{ 'User-Agent' = 'gh-actions'; 'Authorization' = "Bearer $env:GITHUB_TOKEN" }
          $rel = Invoke-RestMethod -Headers $headers -Uri 'https://api.github.com/repos/zhongfly/mpv-winbuild/releases/latest'
          $asset = $rel.assets | Where-Object { $_.name -like 'mpv-x86_64-*' -and $_.name -like '*.7z' } | Select-Object -First 1
          Write-Host "mpv asset: $($asset.name)"
          Invoke-WebRequest -Headers $headers -Uri $asset.browser_download_url -OutFile mpv.7z
          7z x mpv.7z -ompv-extract -y | Out-Null
          $exe = Get-ChildItem -Path mpv-extract -Recurse -Filter mpv.exe | Select-Object -First 1
          Copy-Item $exe.FullName -Destination resources/bin/win/mpv.exe -Force
          Get-ChildItem -Path $exe.Directory -Filter *.dll | Copy-Item -Destination resources/bin/win/ -Force
          # GPL/LGPL compliance: ship mpv's license/notice files next to the binary.
          Get-ChildItem -Path mpv-extract -Recurse -Include *LICENSE*,*COPYING*,*license*,*.txt |
            Copy-Item -Destination resources/bin/win/ -Force -ErrorAction SilentlyContinue
          Write-Host "mpv bundled:"; Get-ChildItem resources/bin/win/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Semantic Release
        # Calcule la version, set la version dans package.json, build + package
        # (electron-builder --publish never), puis crée la Release GitHub avec les
        # notes et y attache l'installeur, le portable et latest.yml (auto-update).
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
