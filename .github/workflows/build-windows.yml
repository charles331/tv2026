name: Build Windows (manuel)

# Build Windows de test, À LA DEMANDE, qui NE PUBLIE PAS de Release.
# L'installeur/portable est disponible en artefact du run (onglet Actions).
# Les Releases officielles sont gérées automatiquement par `release.yml`
# (semantic-release sur `main`).
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        # --frozen-lockfile = respecte pnpm-lock.yaml à l'identique.
        # Le postinstall recompile better-sqlite3 pour l'ABI Electron.
        run: pnpm install --frozen-lockfile

      - name: Bundle mpv (best-effort)
        # Récupère un build mpv Windows x64 et le place dans resources/bin/win/
        # pour que la lecture vidéo marche dans l'app. Non bloquant.
        continue-on-error: true
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path resources/bin/win | Out-Null
          $headers = @{ 'User-Agent' = 'gh-actions'; 'Authorization' = "Bearer $env:GITHUB_TOKEN" }
          $rel = Invoke-RestMethod -Headers $headers -Uri 'https://api.github.com/repos/zhongfly/mpv-winbuild/releases/latest'
          $asset = $rel.assets | Where-Object { $_.name -like 'mpv-x86_64-*' -and $_.name -like '*.7z' } | Select-Object -First 1
          Write-Host "mpv asset: $($asset.name)"
          Invoke-WebRequest -Headers $headers -Uri $asset.browser_download_url -OutFile mpv.7z
          7z x mpv.7z -ompv-extract -y | Out-Null
          $exe = Get-ChildItem -Path mpv-extract -Recurse -Filter mpv.exe | Select-Object -First 1
          Copy-Item $exe.FullName -Destination resources/bin/win/mpv.exe -Force
          Get-ChildItem -Path $exe.Directory -Filter *.dll | Copy-Item -Destination resources/bin/win/ -Force
          # GPL/LGPL compliance: ship mpv's license/notice files next to the binary.
          Get-ChildItem -Path mpv-extract -Recurse -Include *LICENSE*,*COPYING*,*license*,*.txt |
            Copy-Item -Destination resources/bin/win/ -Force -ErrorAction SilentlyContinue
          Write-Host "mpv bundled:"; Get-ChildItem resources/bin/win/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & package (sans publication)
        run: |
          pnpm run build
          pnpm exec electron-builder --win --config electron-builder.yml --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TV2026-windows
          path: |
            release/*.exe
            release/*.yml
